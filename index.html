<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Survivor</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase 웹 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="game-container">
        
        <div id="title-screen" class="screen-container">
            <h1 class="game-logo">DUNGEON SURVIVOR</h1>
            <div class="tap-to-start" onclick="goToLogin()">TAP TO START</div>
        </div>

        <div id="login-screen" class="screen-container hidden">
            <h1 class="game-logo">DUNGEON SURVIVOR</h1>
            <button class="google-btn" onclick="googleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg> 
                구글 계정으로 로그인
            </button>
            <p class="login-notice">※ Firebase 클라우드 서버에 데이터가 자동 저장됩니다.</p>
        </div>

        <div id="save-check-screen" class="screen-container hidden">
            <h1 class="game-logo" style="margin-bottom: 20px;">DUNGEON SURVIVOR</h1>
            <p id="save-status-text" style="color:#aaa; margin-bottom:40px; font-size:13px;">데이터를 확인 중입니다...</p>
            <div id="save-action-btns" style="display:flex; flex-direction:column; gap:12px; width:60%;"></div>
        </div>

        <header id="game-header" class="hidden">
            <span>DUNGEON SURVIVOR</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="guide-btn" onclick="showDungeonGuide()">❓ 가이드</button>
                <button id="lobby-btn" onclick="confirmLobby()" style="background:transparent; border:none; cursor:pointer; font-size:20px; line-height:1;">🚪</button>
            </div>
        </header>
        
        <div id="creation-screen" class="hidden">
            <h2 class="screen-title">직업을 선택하세요</h2>
            <div id="class-grid" class="class-grid"></div>
        </div>

        <div id="main-screen" class="hidden">
            <div id="visual-area">
                <div id="dungeon-bg" class="hidden"></div>

                <div id="dungeon-time-hud" class="hidden" style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 6px; padding: 6px 10px; z-index: 10; display: flex; flex-direction: column; gap: 4px;">
                    <span id="dt-text" style="font-size: 11px; font-weight: bold; color: #eee;">남은 기간: 7일</span>
                    <div style="width: 100px; height: 4px; background: #222; border-radius: 2px;"><div id="dt-bar" style="height: 100%; background: #00e5ff; border-radius: 2px; transition: width 0.3s;"></div></div>
                </div>
                
                <div id="dungeon-turn-hud" class="hidden" style="position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 6px; padding: 6px 10px; z-index: 10;">
                    <span id="dt-turn-text" style="font-size: 11px; font-weight: bold; color: #eee;">남은 턴: 20 / 20</span>
                </div>

                <div id="dungeon-kill-hud" class="hidden" style="position: absolute; top: 50px; left: 12px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 6px; padding: 6px 10px; z-index: 10;">
                    <span id="dt-kill-text" style="font-size: 11px; font-weight: bold; color: #ff9800;">⚔️ 처치: 0</span>
                </div>

                <div id="cp-toast">전투력 상승</div>
                
                <!-- 가독성을 위한 텍스트박스 배경 래퍼 클래스 적용 영역 -->
                <div id="scene-text">마을 광장에 서 있습니다.</div>
                
                <div id="equip-ui-overlay" class="hidden">
                    <div id="paper-doll-container">
                        <div id="paper-doll"></div>
                        <div id="essence-slots" class="ess-container"></div>
                    </div>
                </div>
            </div>

            <div id="exp-hud">
                <div class="exp-bar-bg"><div id="exp-bar"></div></div>
                <span id="exp-text">Lv.1 (0/100)</span>
            </div>

            <div id="hud-area"></div>
            <div id="action-area"></div>
        </div>

        <div id="game-modal" class="hidden">
            <div class="modal-box">
                <p id="modal-text">알림 내용</p>
                <div id="modal-btn-area"><button id="modal-btn" class="modal-btn">확인</button></div>
            </div>
        </div>

        <div id="fade-overlay"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
